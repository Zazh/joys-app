{% extends 'backoffice/base.html' %}

{% block title %}Новый сотрудник{% endblock %}
{% block page_title %}Новый сотрудник{% endblock %}

{% block content %}
<a href="{% url 'backoffice:user_list' %}?tab=staff" class="inline-flex items-center gap-1 text-xs text-stone-500 hover:text-stone-800 mb-4">&larr; Пользователи</a>

<div class="bg-white rounded-xl border border-stone-200 p-4 max-w-md">
    <h2 class="text-sm font-bold mb-4">Создание сотрудника</h2>
    <form method="post" class="space-y-3">
        {% csrf_token %}
        <div>
            <label class="block text-xs text-stone-500 mb-1">Email *</label>
            <input type="email" name="email" required
                   class="w-full px-3 py-2 border border-stone-300 rounded-lg text-xs focus:outline-none focus:ring-2 focus:ring-stone-400">
        </div>
        <div class="grid grid-cols-2 gap-3">
            <div>
                <label class="block text-xs text-stone-500 mb-1">Имя</label>
                <input type="text" name="first_name"
                       class="w-full px-3 py-2 border border-stone-300 rounded-lg text-xs">
            </div>
            <div>
                <label class="block text-xs text-stone-500 mb-1">Фамилия</label>
                <input type="text" name="last_name"
                       class="w-full px-3 py-2 border border-stone-300 rounded-lg text-xs">
            </div>
        </div>
        <div>
            <label class="block text-xs text-stone-500 mb-1">Телефон</label>
            <input type="text" name="phone"
                   class="w-full px-3 py-2 border border-stone-300 rounded-lg text-xs">
        </div>
        <div>
            <label class="block text-xs text-stone-500 mb-1">Роль *</label>
            <select name="role" class="w-full px-3 py-2 border border-stone-300 rounded-lg text-xs">
                {% for value, label in roles %}
                <option value="{{ value }}">{{ label }}</option>
                {% endfor %}
            </select>
        </div>
        <div>
            <label class="block text-xs text-stone-500 mb-1">Пароль * <span class="text-stone-400">(мин. 8 символов)</span></label>
            <input type="password" name="password" required minlength="8" autocomplete="new-password"
                   class="w-full px-3 py-2 border border-stone-300 rounded-lg text-xs">
        </div>
        <button type="submit" class="w-full py-2.5 bg-stone-900 text-white text-sm font-medium rounded-lg hover:bg-stone-800">Создать сотрудника</button>
    </form>
</div>
{% endblock %}
