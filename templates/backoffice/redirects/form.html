{% extends 'backoffice/base.html' %}

{% block title %}{% if redir %}Редактировать редирект{% else %}Новый редирект{% endif %}{% endblock %}

{% block content %}
<a href="{% url 'backoffice:redirect_list' %}" class="inline-flex items-center gap-1 text-xs text-stone-500 hover:text-stone-800 mb-4">&larr; Все редиректы</a>

<form method="post">
    {% csrf_token %}
    <div class="bg-white rounded-xl border border-stone-200 p-4 max-w-xl space-y-4">
        <h3 class="text-sm font-bold">{% if redir %}Редактировать редирект{% else %}Новый редирект{% endif %}</h3>
        <div>
            <label class="block text-xs text-stone-500 mb-1">Путь <span class="text-red-500">*</span></label>
            <input type="text" name="path" value="{{ redir.path|default:'' }}" placeholder="/old-page/" class="w-full px-3 py-2 border border-stone-300 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-stone-400">
        </div>
        <div>
            <label class="block text-xs text-stone-500 mb-1">Назначение <span class="text-red-500">*</span></label>
            <input type="text" name="destination" value="{{ redir.destination|default:'' }}" placeholder="https://example.com/new-page/ или /new-page/" class="w-full px-3 py-2 border border-stone-300 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-stone-400">
        </div>
        <div>
            <label class="block text-xs text-stone-500 mb-1">Тип</label>
            <select name="redirect_type" class="w-full px-3 py-2 border border-stone-300 rounded-lg text-sm">
                <option value="301" {% if redir and redir.redirect_type == 301 %}selected{% endif %}>301 (постоянный)</option>
                <option value="302" {% if redir and redir.redirect_type == 302 %}selected{% endif %}>302 (временный)</option>
            </select>
        </div>
        <div class="flex items-center gap-2">
            <input type="checkbox" name="is_active" id="is_active" {% if not redir or redir.is_active %}checked{% endif %} class="rounded border-stone-300">
            <label for="is_active" class="text-xs text-stone-700">Активен</label>
        </div>
        <div>
            <label class="block text-xs text-stone-500 mb-1">Заметка</label>
            <textarea name="note" rows="2" class="w-full px-3 py-2 border border-stone-300 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-stone-400">{{ redir.note|default:'' }}</textarea>
        </div>
        <button type="submit" class="px-6 py-2.5 bg-stone-900 text-white text-sm font-medium rounded-lg hover:bg-stone-800 transition-colors">
            {% if redir %}Сохранить{% else %}Создать{% endif %}
        </button>
    </div>
</form>
{% endblock %}
