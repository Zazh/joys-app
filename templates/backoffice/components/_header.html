<!-- Header -->
<header class="bg-white border-b border-stone-200 px-4 lg:px-6 py-3 flex items-center">
    <!-- Mobile menu button -->
    <button id="sidebarToggle" class="lg:hidden p-1.5 rounded-lg hover:bg-stone-100 mr-3" type="button">
        <svg class="w-5 h-5" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" d="M3.75 6.75h16.5M3.75 12h16.5m-16.5 5.25h16.5"/>
        </svg>
    </button>
    <h1 class="text-base font-bold">{% block page_title %}Дашборд{% endblock %}</h1>
</header>
