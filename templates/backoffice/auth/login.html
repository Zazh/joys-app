{% load static %}
<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Вход — DR.JOYS Бэкофис</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="robots" content="noindex, nofollow">
    <link rel="stylesheet" href="{% static 'dist/css/backoffice.css' %}">
</head>
<body class="bg-stone-50 min-h-screen flex items-center justify-center font-sans">
    <div class="w-full max-w-sm mx-4">
        <div class="bg-white rounded-2xl shadow-sm border border-stone-200 p-8">
            <div class="text-center mb-6">
                <h1 class="font-benzin text-lg uppercase tracking-wider">DR.JOYS</h1>
                <p class="text-xs text-stone-400 mt-1">Бэкофис</p>
            </div>

            {% if error %}
            <div class="mb-4 px-3 py-2 bg-red-50 text-red-700 text-xs rounded-lg border border-red-200">
                {{ error }}
            </div>
            {% endif %}

            <form method="post" class="space-y-4">
                {% csrf_token %}
                <div>
                    <label class="block text-xs font-medium text-stone-600 mb-1" for="email">Email</label>
                    <input type="email" name="email" id="email" value="{{ email|default:'' }}"
                           class="w-full px-3 py-2 border border-stone-300 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-stone-900 focus:border-transparent"
                           placeholder="your@email.com" autocomplete="email" required autofocus>
                </div>
                <div>
                    <label class="block text-xs font-medium text-stone-600 mb-1" for="password">Пароль</label>
                    <input type="password" name="password" id="password"
                           class="w-full px-3 py-2 border border-stone-300 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-stone-900 focus:border-transparent"
                           placeholder="••••••••" autocomplete="current-password" required>
                </div>
                <button type="submit"
                        class="w-full py-2.5 bg-stone-900 text-white text-sm font-medium rounded-lg hover:bg-stone-800 transition-colors">
                    Войти
                </button>
            </form>
        </div>
    </div>
</body>
</html>
