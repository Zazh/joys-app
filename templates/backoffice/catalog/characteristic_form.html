{% extends 'backoffice/base.html' %}

{% block title %}Редактировать: {{ char.name_ru }}{% endblock %}

{% block content %}
<a href="{% url 'backoffice:characteristic_list' %}" class="inline-flex items-center gap-1 text-xs text-stone-500 hover:text-stone-800 mb-4">&larr; Все характеристики</a>

<form method="post">
    {% csrf_token %}
    <div class="bg-white rounded-xl border border-stone-200 p-4 max-w-xl space-y-4">
        <h3 class="text-sm font-bold">Редактировать характеристику</h3>
        <div class="grid grid-cols-1 gap-3">
            <div>
                <label class="block text-xs text-stone-500 mb-1">Название (RU) <span class="text-red-500">*</span></label>
                <input type="text" name="name_ru" value="{{ char.name_ru }}" required class="w-full px-3 py-2 border border-stone-300 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-stone-400">
            </div>
            <div>
                <label class="block text-xs text-stone-500 mb-1">Название (KK)</label>
                <input type="text" name="name_kk" value="{{ char.name_kk|default:'' }}" class="w-full px-3 py-2 border border-stone-300 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-stone-400">
            </div>
            <div>
                <label class="block text-xs text-stone-500 mb-1">Название (EN)</label>
                <input type="text" name="name_en" value="{{ char.name_en|default:'' }}" class="w-full px-3 py-2 border border-stone-300 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-stone-400">
            </div>
            <div>
                <label class="block text-xs text-stone-500 mb-1">Единица измерения</label>
                <select name="unit" class="w-full px-3 py-2 border border-stone-300 rounded-lg text-sm">
                    <option value="">Нет (свободный текст)</option>
                    {% for u in units %}
                    <option value="{{ u.id }}" {% if char.unit_id == u.id %}selected{% endif %}>{{ u.name }} ({{ u.abbr }})</option>
                    {% endfor %}
                </select>
            </div>
            <div>
                <label class="block text-xs text-stone-500 mb-1">Порядок</label>
                <input type="number" name="order" value="{{ char.order }}" class="w-full px-3 py-2 border border-stone-300 rounded-lg text-sm">
            </div>
        </div>
        <button type="submit" class="px-6 py-2.5 bg-stone-900 text-white text-sm font-medium rounded-lg hover:bg-stone-800 transition-colors">Сохранить</button>
    </div>
</form>
{% endblock %}
