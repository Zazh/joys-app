{% extends 'backoffice/base.html' %}

{% block title %}Создать QR-код{% endblock %}

{% block content %}
<a href="{% url 'backoffice:qrcode_list' %}" class="inline-flex items-center gap-1 text-xs text-stone-500 hover:text-stone-800 mb-4">
    &larr; Все QR-коды
</a>

<div class="max-w-lg">
    <div class="bg-white rounded-xl border border-stone-200 p-4">
        <h2 class="text-sm font-bold mb-4">Новый QR-код</h2>

        {% if error %}
        <div class="mb-4 px-3 py-2 bg-red-50 border border-red-200 text-red-700 text-xs rounded-lg">{{ error }}</div>
        {% endif %}

        <form method="post">
            {% csrf_token %}
            <div class="space-y-3">
                <div>
                    <label class="block text-xs text-stone-500 mb-1">Название</label>
                    <input type="text" name="title" value="{{ title|default:'' }}" placeholder="Например: Ссылка на каталог"
                           class="w-full px-3 py-2 border border-stone-300 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-stone-400">
                </div>
                <div>
                    <label class="block text-xs text-stone-500 mb-1">Содержимое <span class="text-red-500">*</span></label>
                    <textarea name="content" rows="3" placeholder="URL, текст или любая строка"
                              class="w-full px-3 py-2 border border-stone-300 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-stone-400">{{ content|default:'' }}</textarea>
                </div>
            </div>
            <div class="mt-4 flex gap-2">
                <button type="submit" class="px-4 py-2 bg-stone-900 text-white text-xs rounded-lg hover:bg-stone-800">Создать</button>
                <a href="{% url 'backoffice:qrcode_list' %}" class="px-4 py-2 border border-stone-300 text-xs rounded-lg hover:bg-stone-100">Отмена</a>
            </div>
        </form>
    </div>
</div>
{% endblock %}
