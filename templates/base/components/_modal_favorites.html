{% load i18n %}
<!-- BEGIN modal favorites -->
<div class="modal-overlay hidden" id="modalFavorites">
    <div class="modal-content modal-wide">
        <!-- Header -->
        <div class="modal-header">
            <div></div>
            <button class="modal-close" type="button" aria-label="{% trans 'Закрыть' %}" onclick="closeModal(document.getElementById('modalFavorites'))">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <line x1="18" y1="6" x2="6" y2="18"/>
                    <line x1="6" y1="6" x2="18" y2="18"/>
                </svg>
            </button>
        </div>

        <!-- Title -->
        <h2 class="modal-title">{% trans "Избранное" %}</h2>

        <!-- Favorites list (JS-driven) -->
        <div class="flex flex-col gap-3" id="favoritesList"></div>

        <!-- Empty state (hidden by default) -->
        <div class="hidden flex-col items-center justify-center py-12" id="favoritesEmpty">
            <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1" class="text-gray-200 mb-4">
                <path d="M20.84 4.61a5.5 5.5 0 00-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 00-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 000-7.78z"/>
            </svg>
            <p class="text-sm text-gray-500">{% trans "Пока пусто" %}</p>
        </div>
    </div>
</div>
<!-- END modal favorites -->
